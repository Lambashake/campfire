<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keep the Fire Going</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">
        <div id="sparks-container" class="sparks-container"></div>

        <div class="hearth">
            <div id="fire-sprite" class="fire status-low"></div>
            <div class="logs"></div>
        </div>

        <div class="status-panel">
            <p id="fire-status">Bringing the embers to life...</p>
            <p class="presence-counter">✨ Someone else is sitting by the fire with you.</p>
        </div>

        <button id="open-modal-btn" class="pixel-btn">Stoke the Fire</button>
    </div>

    <div id="note-modal" class="modal hidden">
        <div class="modal-content">
            <h2>What are you grateful for today?</h2>
            <input type="text" id="note-input" maxlength="100" placeholder="Type a short note..." autocomplete="off">
            <div class="modal-actions">
                <button id="close-modal-btn" class="pixel-btn secondary">Cancel</button>
                <button id="submit-note-btn" class="pixel-btn">Add to the Fire</button>
            </div>
        </div>
    </div>

    <audio id="fire-audio" loop src="fire.mp3"></audio>

    <script type="module" src="app.js?v=4"></script>

</body>
</html>
